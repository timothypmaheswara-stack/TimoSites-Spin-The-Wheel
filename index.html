<script>
const fill = document.getElementById("loadingFill");
const screen = document.getElementById("loadingScreen");

let progress = 0;

function fakeLoad() {
  if (progress < 95) {
    progress += Math.random() * 10;
    fill.style.width = progress + "%";

    setTimeout(fakeLoad, Math.random() * 400 + 200);

  } else {
    // Step 1: go to 100%
    progress = 100;
    fill.style.width = "100%";

    // Step 2: WAIT for the bar animation to visually finish
    setTimeout(() => {

      // Step 3: fade AFTER animation
      screen.classList.add("fade-out");

      setTimeout(() => {
        screen.style.display = "none";
      }, 800);

    }, 300); // <-- THIS is the key (matches animation time)
  }
}

fakeLoad();
</script>

/* ---------------------------
  THEME SYSTEM
--------------------------- */
const themeSelect = document.getElementById("themeSelect");

// detect system dark mode
function isSystemDark(){
  return window.matchMedia("(prefers-color-scheme: dark)").matches;
}

// apply theme
function applyTheme(mode){
  document.body.classList.remove("dark");

  if(mode === "dark"){
    document.body.classList.add("dark");
  }

  if(mode === "system"){
    if(isSystemDark()) document.body.classList.add("dark");
  }

  if(mode === "daylight"){
  // Function to update theme based on sunrise/sunset
  function updateDaylightTheme(lat, lon){
    const now = new Date();
    const times = SunCalc.getTimes(now, lat, lon);
    if(now >= times.sunrise && now < times.sunset){
      document.body.classList.remove("dark"); // day
    } else {
      document.body.classList.add("dark"); // night
    }
  }

  // Ask for user location
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        updateDaylightTheme(lat, lon); // first check

        // Update every minute
        setInterval(() => updateDaylightTheme(lat, lon), 60*1000);
      },
      (err) => {
        console.warn("Location denied or unavailable, fallback to UTC.");
        updateDaylightTheme(0,0); // fallback if denied
      }
    );
  } else {
    updateDaylightTheme(0,0); // fallback if no geolocation support
    }
  }
}

// load saved theme
let savedTheme = localStorage.getItem("theme") || "light";
themeSelect.value = savedTheme;
applyTheme(savedTheme);

// on change
themeSelect.onchange = ()=>{
  const mode = themeSelect.value;
  localStorage.setItem("theme", mode);
  applyTheme(mode);
};

// update if system theme changes
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ()=>{
  if(themeSelect.value === "system"){
    applyTheme("system");
  }
});

/* ---------------------------
  DRAW WHEEL
--------------------------- */
function drawWheel(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const n = segments.length;
  if(n===0) return;
  const arc = 2*Math.PI/(n - (removingIndex !== null ? removeProgress : 0));
  for(let i=0;i<n;i++){
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.arc(center,center,center,angle+i*arc,angle+(i+1)*arc);
    ctx.fillStyle = colors[i] || randomColor();
    ctx.fill();
    if(document.getElementById("toggleOutline").checked){
      ctx.strokeStyle=document.getElementById("outlineColor").value; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.save(); ctx.translate(center,center); ctx.rotate(angle+(i+0.5)*arc);
    let fontSize = Math.min(18,Math.max(8,280/n));
    ctx.font="bold "+fontSize+"px Arial";
    while(ctx.measureText(segments[i]).width>center*0.5 && fontSize>8){ fontSize--; ctx.font="bold "+fontSize+"px Arial"; }
    ctx.fillStyle="#000"; ctx.textAlign="right"; ctx.fillText(segments[i], center-10,5);
    ctx.restore();
  }
  const cSize = document.getElementById("centerSize").value;
  ctx.beginPath(); ctx.arc(center,center,cSize,0,Math.PI*2); ctx.fillStyle=document.getElementById("centerColor").value; ctx.fill();
  if(spinning){ pointerAngle = Math.sin(Date.now()/200)*0.15; } else { pointerAngle *= 0.8; }
  // idle slow spin
if(!spinning && idleSpin){
  angle += 0.002; // slow smooth rotation
}
  ctx.save();
ctx.translate(center,0);
ctx.rotate(pointerAngle);

let pointerColor = "black";

if(modStates.colorfulPointer && segments.length > 0){
  const arc = 2 * Math.PI / segments.length;
  let normalized = (angle % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  let index = Math.floor(normalized / arc);

  let baseColor = colors[index];

  function darken(hex){
    let r = parseInt(hex.substr(1,2),16);
    let g = parseInt(hex.substr(3,2),16);
    let b = parseInt(hex.substr(5,2),16);

    r = Math.floor(r * 0.6);
    g = Math.floor(g * 0.6);
    b = Math.floor(b * 0.6);

    return `rgb(${r},${g},${b})`;
  }

  pointerColor = darken(baseColor);
}

ctx.fillStyle = pointerColor;
  ctx.beginPath(); ctx.moveTo(-10,10); ctx.lineTo(10,10); ctx.lineTo(0,35); ctx.fill(); ctx.restore();
}

    input.type="color";

    // ← HERE IS THE FIX
    input.value = fixedColors[i % fixedColors.length];

});

saveState();

  for(let i=0; i<segments.length; i++){
    let wrapper = div.children[i];

    const oldDup = wrapper.querySelector(".dupText");

    // mark duplicate
    const isDup = items.indexOf(items[i]) !== i;
    if(isDup){
      const dupText = document.createElement("span");
      dupText.className = "dupText";
      dupText.style.color = "#f44336";
      dupText.style.fontSize = "10px";

    } else {
      const input = wrapper.querySelector("input[type=color]");
      if(input) input.style.border = "";
    }
  }

  // optional gray notif
  // get unique duplicate words
const uniqueDuplicates = [...new Set(duplicates)];

// check if duplicates changed
const isDifferent = JSON.stringify(uniqueDuplicates) !== JSON.stringify(lastDuplicates);

if(uniqueDuplicates.length > 0 && isDifferent){

// Confetti Pop
function confettiPopLite(x, y) {
  const colors = ["#f44336","#ff9800","#ffeb3b","#4caf50","#2196f3","#9c27b0"];
  const total = 15; // way less, keeps it smooth

  for (let i = 0; i < total; i++) {
    const confetti = document.createElement("div");
    confetti.style.position = "fixed";
    confetti.style.width = "5px";
    confetti.style.height = "5px";
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.left = x + "px";
    confetti.style.top = y + "px";
    confetti.style.borderRadius = "50%";
    confetti.style.pointerEvents = "none";
    confetti.style.zIndex = "3000";
    document.body.appendChild(confetti);

    const angle = Math.random() * 2 * Math.PI;
    const speed = Math.random() * 8 + 6; // slower than mega-burst
    const gravity = 0.4 + Math.random() * 0.3;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    let opacity = 1;

    function animate() {
      vy += gravity * 0.3;
      confetti.style.left = (confetti.offsetLeft + vx) + "px";
      confetti.style.top = (confetti.offsetTop + vy) + "px";
      opacity -= 0.02;
      confetti.style.opacity = opacity;
      if (opacity > 0) requestAnimationFrame(animate);
      else confetti.remove();
    }
    animate(); 
  }
}

/* ---------------------------
  SPIN WHEEL
--------------------------- */
function spin() {
console.log("SPIN CLICKED");
  if (spinning || segments.length < 2) return;

  buttonSound.currentTime = 0;
  if(!isMuted){
  buttonSound.currentTime = 0;
  buttonSound.play();
}

  spinning = true;

  // RANDOM START POSITION (THIS IS YOUR IDEA)
  angle = Math.random() * Math.PI * 2;

  // RANDOM SPEED
  velocity = Math.random() * 0.3 + 0.4;

  lastTickIndex = -1;

  function animate() {
    angle += velocity;
    velocity *= 0.988; // smooth slowdown

    // SIMPLE TICK (no weird math)
    const arc = 2 * Math.PI / segments.length;
    let normalized = (angle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    let currentIndex = Math.floor(normalized / arc);

    if (currentIndex !== lastTickIndex) {
      tickSound.currentTime = 0;
      if(!isMuted){
  tickSound.currentTime = 0;
  tickSound.play();
}
      lastTickIndex = currentIndex;
    }

    drawWheel();

    if (velocity < 0.002) {
  velocity = 0; // snap stop (clean finish)
  spinning = false;
  determineWinner();
  return;
}

    requestAnimationFrame(animate);
  }

  animate();
}
/* ---------------------------
  DETERMINE WINNER
--------------------------- */
const modal=document.getElementById("modal");
function determineWinner() {
  const n = segments.length;
  if (n === 0) return;

  pointerAngle = 0;
  drawWheel();

  const arc = 2 * Math.PI / n;
  let adj = (angle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let pointer = (adj + Math.PI / 2) % (2 * Math.PI);
  let index = Math.floor((2 * Math.PI - pointer) / arc);
  index = index % segments.length;   // ← ADD THIS LINE
  lastWinnerIndex = index;
  const lockedIndex = index; // LOCK IT
  
  const rect = document.querySelector(".modalContent").getBoundingClientRect();
const cx = rect.left + rect.width / 2;
const cy = rect.top + rect.height / 2;
confettiPopLite(cx, cy); // one smooth pop

  document.getElementById("winnerText").innerText = "Result: " + segments[index];
  addToHistory(segments[index]);
  modal.style.display = "flex";
  
  const removeBtn = document.getElementById("removeBtn");

if (eliminateMode) {
  removeBtn.style.display = "none"; // hide it
} else {
  removeBtn.style.display = "inline-block"; // normal mode
}
  
  if (eliminateMode && segments.length > 1) {
  spinning = true; // block spinning during elimination

  setTimeout(() => {
    // remove the CORRECT one (locked)
    segments.splice(lockedIndex, 1);
    colors.splice(lockedIndex, 1);

    document.getElementById("optionsInput").value = segments.join("\n");
    updateOptions();

    spinning = false; // allow spin again

    if (segments.length === 1) {
      showNotification('<i class="fa-solid fa-trophy"></i> FINAL WINNER: ' + segments[0]);
    }
  }, 500); // faster = less abuse
}

  confettiPopLite(cx, cy);
  setTimeout(() => confettiPopLite(cx, cy), 150);
  setTimeout(() => confettiPopLite(cx, cy), 300);
  
  for(let i=0; i<3; i++){
  setTimeout(() => confettiPopLite(cx, cy), i*200);
  }
}

/* ---------------------------
  HISTORY
--------------------------- */
function addToHistory(result){
  // get history array
  let history = JSON.parse(localStorage.getItem("spinHistory") || "[]");
  history.unshift(result); // newest on top
  if(history.length > 20) history.pop(); // keep last 20
  localStorage.setItem("spinHistory", JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const panel = document.getElementById("historyPanel");
  let history = JSON.parse(localStorage.getItem("spinHistory") || "[]");
  
  panel.innerHTML = ""; // clear

  if(history.length === 0){
    panel.innerHTML = "No spins yet.";
    return;
  }

  // create each item with delete button
  history.forEach((res, i)=>{
    const div = document.createElement("div");
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.marginBottom = "4px";
    div.style.padding = "4px 6px";
    div.style.borderRadius = "6px";
    div.style.background = "var(--color-panel-bg)";

    const span = document.createElement("span");
    span.innerText = res;

    const delBtn = document.createElement("button");
    delBtn.innerHTML = '<i class="fa-solid fa-xmark" style="color:#f44336;"></i>';
    delBtn.style.padding = "2px 6px";
    delBtn.style.fontSize = "12px";
    delBtn.style.cursor = "pointer";
    delBtn.onclick = ()=>{
      history.splice(i,1);
      localStorage.setItem("spinHistory", JSON.stringify(history));
      renderHistory();
    };

    div.appendChild(span);
    div.appendChild(delBtn);
    panel.appendChild(div);
  });

  // auto-scroll to top (newest first)
  panel.scrollTop = 0;
}

// Clear All button
document.getElementById("clearHistoryBtn").onclick = ()=>{

    localStorage.setItem("spinHistory", JSON.stringify([]));

    segments=data.segments;
    colors=data.colors;
    document.getElementById("optionsInput").value = segments.join("\n");
    document.getElementById("outlineColor").value = data.outline||"#000";
    document.getElementById("toggleOutline").checked = data.showOutline ?? true;
    document.getElementById("centerColor").value = data.centerColor||"#fff";
    document.getElementById("centerSize").value = data.centerSize||60;

    segments=["Apple","Banana","Kiwi","Grape","Orange"];
    colors=["#f44336","#ff9800","#4caf50","#9c27b0","#2196f3"];

}
